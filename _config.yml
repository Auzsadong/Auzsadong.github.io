# Site - 网站基础信息
title: Auzsadong's Blog        # 你的博客标题
subtitle: '嵌入式开发与硬件探索' # 副标题
description: '电子信息工程 | STM32 | FPGA | 智能硬件' # 网站描述，有利于SEO
keywords: '嵌入式, 硬件, STM32, FPGA, Auzsadong'
author: Auzsadong              # 作者名字
language: zh-CN                # 关键：设置为中文
timezone: 'Asia/Shanghai'      # 设置时区为上海

# URL - 线上访问地址
# 必须设置为你 GitHub Pages 的真实地址
url: https://Auzsadong.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory - 目录配置
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing - 写作配置
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

# 代码高亮配置 - Fluid 推荐使用 highlight.js
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Index setting - 首页文章列表
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination - 分页
per_page: 10
pagination_dir: page

# Extensions - 关键：切换主题
theme: fluid  # 已经改为 fluid

# Deployment - 自动部署配置
deploy:
  type: git
  repo: https://github.com/Auzsadong/Auzsadong.github.io.git
  branch: main

fluid:
  index:
    banner_img: /img/home_bg.jpg
    banner_mask_alpha: 0.1
    slogan:
      enable: true
      text: "Auzsadong 的硬件开发笔记"