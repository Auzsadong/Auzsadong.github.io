# Site - 网站基础信息
title: Auzsadong's Blog
subtitle: '嵌入式开发与硬件探索'
description: '电子信息工程 | STM32 | FPGA | 智能硬件'
keywords: '嵌入式, 硬件, STM32, FPGA, Auzsadong'
author: Auzsadong
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://Auzsadong.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true  # 已开启：每篇文章都有同名资源文件夹
relative_link: false
future: true

# --- 新增：Markdown 解析器增强配置 ---
# 用于解决文章资源文件夹图片路径转换问题
marked:
  prependRoot: true
  postAsset: true

# 代码高亮配置
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Index setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: fluid

# Deployment
deploy:
  type: git
  repo: https://github.com/Auzsadong/Auzsadong.github.io.git
  branch: main